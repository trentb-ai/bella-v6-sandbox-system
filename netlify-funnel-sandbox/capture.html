<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Custom AI Strategy - Pillar + Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
        }

        .card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand">
            <h1>Pillar + Post</h1>
            <p>AI Automation Agency</p>
        </div>

        <div class="card">
            <h2>See Your AI Sales Team</h2>
            <p class="subtitle">Enter your details below and we'll build a personalised AI demo for your business in
                seconds.</p>

            <form id="captureForm">
                <div class="form-group">
                    <label for="firstName">Your First Name</label>
                    <input type="text" id="firstName" placeholder="Jane" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="jane@company.com" required>
                </div>

                <div class="form-group">
                    <label for="website">Your Business Website</label>
                    <input type="text" id="website" placeholder="yourbusiness.com" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    <span>Generate My AI Demo</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>

            <p class="error" id="errorMsg"></p>
        </div>

        <p class="footer">By continuing, you agree to our Terms of Service and Privacy Policy.</p>
    </div>

    <script>
        const WORKER_URL = 'https://personalisedaidemofinal-sandbox.trentbelasco.workers.dev';
        const LOADING_PAGE = './loading-v15.html';

        // ── GHL Integration ───────────────────────────────────────────────────
        // V3 Fix D: GHL API key REMOVED from frontend. Contact creation is now
        // handled server-side by the /log-lead CF Worker using env.GHL_API_KEY.
        // The worker returns { success, lid, contactId } — no key exposure.
        const GHL_LOCATION_ID = 'g7AY3bmahEzCyvglO9IG'; // Pillar and Post Digital

        async function createGHLContact(firstName, email, website) {
            // V3 Fix D: No-op — GHL contact creation moved to /log-lead worker.
            // Worker creates the contact server-side and returns contactId in its response.
            return null;
        }
        // ─────────────────────────────────────────────────────────────────────

        const form = document.getElementById('captureForm');
        const btn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const email = document.getElementById('email').value.trim();
            let website = document.getElementById('website').value.trim();

            // Normalise URL — accept domain.com, www.domain.com, https://...
            website = website.replace(/^https?:\/\//, '');
            website = 'https://' + website;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';
            errorEl.style.display = 'none';

            try {
                // FIX: Generate lid client-side, redirect instantly — no waiting on worker
                // Loading page owns the scrape. Capture just navigates fast.
                const lid = 'anon_' + Math.random().toString(36).slice(2, 10);

                // Pre-warm scrape fire-and-forget (loading page will call it too)
                fetch(`${WORKER_URL}/log-lead`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, email, websiteUrl: website, lid })
                }).catch(() => {});

                // Redirect immediately — no blocking wait
                window.location.href = `${LOADING_PAGE}?lid=${lid}&web=${encodeURIComponent(website)}&name=${encodeURIComponent(firstName)}&email=${encodeURIComponent(email)}`;

            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Generate My AI Demo</span>&#8594;';
            }
        });
    </script>
</body>

</html>
