name = "frozen-bella-rescript-v2-bridge"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

[[kv_namespaces]]
binding = "LEADS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

# Tools worker — Tier 1 (instant KV reads) + Tier 2 (run_deep_analysis)
[[services]]
binding = "TOOLS"
service = "bella-tools-worker-v8"

# Call Brain DO — state machine authority (Phase C integration)
[[services]]
binding = "CALL_BRAIN"
service = "frozen-bella-rescript-v2-brain"

[vars]
USE_DO_BRAIN = "true"
# GEMINI_API_KEY set via: wrangler secret put GEMINI_API_KEY
# TOOLS_BEARER    set via: wrangler secret put TOOLS_BEARER

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
