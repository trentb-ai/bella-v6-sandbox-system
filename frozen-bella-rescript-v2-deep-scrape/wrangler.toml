name = "frozen-bella-rescript-v2-deep-scrape"
main = "src/index.ts"
compatibility_date = "2025-10-22"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

# ─── KV ────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "WORKFLOWS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

# ─── Workflows ─────────────────────────────────────────────────────────────────
[[workflows]]
name = "frozen-bella-rescript-v2-deep-scrape"
binding = "BELLAV9ORCHESTRATOR_WORKFLOW"
class_name = "BellaV9Orchestrator"

# ─── Secrets ───────────────────────────────────────────────────────────────────
# APIFY_TOKEN
# FIRECRAWL_KEY
# GEMINI_API_KEY

# ─── Service Bindings ──────────────────────────────────────────────────────────
[[services]]
binding = "CONSULTANT"
service = "frozen-bella-rescript-v2-consultant"

[ai]
binding = "AI"

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
