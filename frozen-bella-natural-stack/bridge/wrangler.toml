name = "frozen-bella-natural-bridge"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

[[kv_namespaces]]
binding = "LEADS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

[[services]]
binding = "TOOLS"
service = "frozen-bella-natural-tools"

[[services]]
binding = "CALL_BRAIN"
service = "frozen-bella-natural-brain"

[vars]
USE_DO_BRAIN = "true"
ENABLE_EMBEDDING = "true"
# GEMINI_API_KEY set via: wrangler secret put GEMINI_API_KEY
# TOOLS_BEARER    set via: wrangler secret put TOOLS_BEARER

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
