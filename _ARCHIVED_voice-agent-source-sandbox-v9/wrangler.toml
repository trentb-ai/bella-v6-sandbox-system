name = "bella-voice-agent-sandbox-v9"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

[[durable_objects.bindings]]
name = "BellaAgent"
class_name = "BellaAgent"

[[migrations]]
tag = "v9"
new_sqlite_classes = ["BellaAgent"]

[[kv_namespaces]]
binding = "LEADS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

# Service bindings — internal traffic stays on CF backbone
[[services]]
binding = "TOOLS"
service = "bella-tools-worker-v9"

[[services]]
binding = "CONSULTANT"
service = "consultant-sandbox-v9"

[[services]]
binding = "MCP"
service = "leads-mcp-worker-sandbox-v9"

[vars]
# BRIDGE_URL must remain a public HTTPS URL — Deepgram's cloud calls it externally (can't be a service binding)
BRIDGE_URL = "https://deepgram-bridge-sandbox-v9.trentbelasco.workers.dev"
GHL_LOCATION_ID = "g7AY3bmahEzCyvglO9IG"
CARTESIA_VOICE_ID = "8985388c-1332-4ce7-8d55-789628aa3df4"
# TOOLS_BEARER set via: wrangler secret put TOOLS_BEARER
# DEEPGRAM_API_KEY set via: wrangler secret put DEEPGRAM_API_KEY

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
