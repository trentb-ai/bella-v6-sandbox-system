name = "chris-voice-agent-v1"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

[[durable_objects.bindings]]
name = "ChrisAgent"
class_name = "ChrisAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChrisAgent"]

[[kv_namespaces]]
binding = "LEADS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

[[services]]
binding = "TOOLS"
service = "bella-tools-worker-v8"

[vars]
BRIDGE_URL = "https://chris-bridge-v1.trentbelasco.workers.dev/v9/chat/completions"
GHL_LOCATION_ID = "g7AY3bmahEzCyvglO9IG"
# DEEPGRAM_API_KEY set via: wrangler secret put DEEPGRAM_API_KEY
# TOOLS_BEARER_TOKEN set via: wrangler secret put TOOLS_BEARER_TOKEN

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
