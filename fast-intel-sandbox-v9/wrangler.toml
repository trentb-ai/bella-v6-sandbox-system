name = "fast-intel-v8"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9488d0601315a70cac36f9bd87aa4e82"

# ─── KV ───────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "LEADS_KV"
id = "0fec6982d8644118aba1830afd4a58cb"

# ─── Service bindings to downstream workers ───────────────────────────────────
[[services]]
binding = "CONSULTANT"
service = "consultant-v8"

[[services]]
binding = "DEEP_SCRAPE"
service = "deep-scrape-workflow-v8"

[[services]]
binding = "BIG_SCRAPER"
service = "personalisedaidemofinal-sandbox"

# ─── Secrets (set via: wrangler secret put <NAME>) ───────────────────────────
# FIRECRAWL_API_KEY
# GEMINI_API_KEY  (fallback if Consultant service binding unavailable)

[vars]
# Non-secret vars only

[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
